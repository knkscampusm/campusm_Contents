<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>의대관 콘텐츠 신청/취소</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f4f4f2;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e3;
      padding: 0 1.25rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; }
    .logo span { color: #2BADA0; }
    .admin-toggle {
      font-size: 12px;
      color: #aaa;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .admin-toggle:hover { color: #555; border-color: #bbb; }

    /* ── LAYOUT ── */
    .main { max-width: 660px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.875rem;
    }

    /* ── FORM ELEMENTS ── */
    input[type="text"], input[type="email"],
    input[type="password"], input[type="date"] {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #2BADA0; background: #fff; }

    .btn {
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      display: inline-block;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary { background: #2BADA0; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #249890; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-danger { background: #e5534b; color: #fff; }
    .btn-danger:hover { background: #cc4b44; }
    .btn-outline { background: #fff; color: #555; border: 1px solid #ddd; }
    .btn-outline:hover { background: #f5f5f3; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-full { width: 100%; text-align: center; }

    /* ── STUDENT INFO ── */
    .student-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .student-name { font-size: 20px; font-weight: 700; }
    .badge { font-size: 13px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .badge-teal { background: #e4f5f3; color: #2BADA0; }
    .badge-gray { background: #f0f0ee; color: #666; }

    /* ── CONTENT CARD ── */
    .content-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      padding: 1.125rem 1.375rem;
      margin-bottom: 0.75rem;
    }
    .content-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.875rem;
      gap: 0.75rem;
    }
    .content-name { font-size: 16px; font-weight: 600; }
    .content-dates { font-size: 12px; color: #aaa; margin-top: 3px; line-height: 1.7; }
    .refund-tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .refund-on  { background: #e4f5f3; color: #2BADA0; }
    .refund-off { background: #f0f0ee; color: #aaa; }

    /* ── SELECTION BUTTONS ── */
    .sel-row { display: flex; gap: 8px; }
    .sel-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 14px;
      font-weight: 500;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fafafa;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .sel-btn:hover:not(:disabled) { border-color: #ccc; background: #f2f2f0; color: #666; }
    .sel-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .sel-refund { border-color: #e5534b !important; background: #fef3f2 !important; color: #e5534b !important; }
    .sel-apply  { border-color: #2BADA0 !important; background: #e4f5f3 !important; color: #2BADA0 !important; }
    .sel-none   { border-color: #ccc    !important; background: #f0f0ee !important; color: #888    !important; }

    /* ── MESSAGES ── */
    .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
    .msg.error   { color: #e5534b; }
    .msg.success { color: #2BADA0; }
    .msg.loading { color: #aaa; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 380px;
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
    .field { margin-bottom: 0.875rem; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 1px solid #e5e5e3; margin-bottom: 1.125rem; }
    .tab {
      padding: 10px 1.25rem;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab.active { color: #2BADA0; border-bottom-color: #2BADA0; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── ADD FORM ── */
    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.875rem; }
    .add-grid .span2 { grid-column: 1 / -1; }
    .add-grid label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .add-grid input { padding: 10px 12px; font-size: 14px; }

    /* ── CONTENT LIST (admin) ── */
    .cl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0ee;
    }
    .cl-item:last-child { border-bottom: none; }
    .cl-info { flex: 1; }
    .cl-name  { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .cl-dates { font-size: 12px; color: #aaa; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
    th {
      background: #f8f8f6;
      text-align: left;
      padding: 9px 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e5e5e3;
      white-space: nowrap;
    }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0ee; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    .tag-r { color: #e5534b; font-weight: 600; }
    .tag-a { color: #2BADA0; font-weight: 600; }

    /* ── MISC ── */
    .section-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 0.875rem; }
    .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
    .row { display: flex; gap: 10px; align-items: center; }
    .sb  { justify-content: space-between; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .add-grid { grid-template-columns: 1fr; }
      .add-grid .span2 { grid-column: 1; }
    }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ── HEADER ── -->
<div class="header">
  <div class="logo" style="color:#2BADA0;">강남대성기숙 의대관</div>
  <button class="admin-toggle" onclick="openAdminLogin()">관리자</button>
</div>

<!-- ══════════════════════════════
     STUDENT VIEW
══════════════════════════════ -->
<div id="studentView" class="main">

  <div class="card">
    <div style="font-size:13px;color:#888;font-weight:500;margin-bottom:8px;">학번 입력</div>
    <div class="row">
      <input type="text" id="sidInput" placeholder="학번을 입력하세요" maxlength="20" inputmode="numeric" style="flex:1;" />
      <button class="btn btn-primary" id="lookupBtn" onclick="lookupStudent()" style="padding:13px 22px;">조회</button>
    </div>
    <div id="inputGuide" style="font-size:13px;color:#2BADA0;text-align:center;margin-top:10px;font-weight:500;">학생증을 태깅해주세요</div>
    <div id="lookupMsg" class="msg"></div>
  </div>

  <div id="studentInfoCard" class="card" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <div class="student-row" style="flex:1;flex-wrap:wrap;">
        <span class="student-name" id="disp_name"></span>
        <span class="badge badge-teal" id="disp_ban"></span>
        <span class="badge badge-gray" id="disp_group"></span>
        <span class="badge" id="disp_type" style="display:none;background:#fff8e1;color:#f9a825;"></span>
      <span class="badge" id="disp_t1" style="display:none;background:#e8f5e9;color:#388e3c;"></span>
      <span class="badge" id="disp_t2" style="display:none;background:#e8f5e9;color:#388e3c;"></span>
      </div>
    </div>
  </div>

  <div id="refundNotice" style="display:none;background:#fff;border:1px solid #e5e5e3;border-radius:14px;padding:1.125rem 1.375rem;margin-bottom:0.875rem;"></div>

  <div id="contentsSection" style="display:none;">
    <div id="contentList"></div>
  </div>

</div>

<!-- ══════════════════════════════
     ADMIN VIEW
══════════════════════════════ -->
<div id="adminView" style="display:none;" class="main">

  <div class="row sb" style="margin-bottom:1rem;">
    <div style="font-size:16px;font-weight:700;">관리자 패널</div>
    <button class="btn btn-outline btn-sm" onclick="adminLogout()">로그아웃</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">콘텐츠 관리</div>
    <div class="tab" onclick="switchTab(1)">신청/취소 현황</div>
    <div class="tab" onclick="switchTab(2)">변경 처리</div>
  </div>

  <!-- 콘텐츠 관리 -->
  <div id="tab0" class="tab-pane active">
    <div class="card">
      <div class="section-title">취소 기준일 설정</div>
      <p style="font-size:13px;color:#888;margin-bottom:12px;">이 날짜 이후에 배부되는 콘텐츠만 취소 가능 상태로 표시됩니다.</p>
      <div class="row">
        <input type="date" id="cutoffDate" style="flex:1;" />
        <button class="btn btn-primary" onclick="saveCutoffDate()" style="padding:13px 20px;">저장</button>
      </div>
      <div id="cutoffMsg" class="msg"></div>
    </div>
    <div class="card">
      <div class="section-title">콘텐츠 추가</div>
      <div class="add-grid">
        <div class="span2">
          <label>콘텐츠 이름</label>
          <input type="text" id="newName" placeholder="예: CIRCUIT 수학 43~45회" />
        </div>
        <div>
          <label>과목</label>
          <select id="newCategory" style="width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:10px;background:#fafafa;outline:none;">
            <option value="국어">국어</option>
            <option value="수학">수학</option>
            <option value="영어">영어</option>
            <option value="과학탐구">과학탐구</option>
          </select>
        </div>
        <div>
          <label>배부일</label>
          <input type="date" id="newDelivery" />
        </div>
        <div class="span2">
          <button class="btn btn-primary btn-full" onclick="addContent()">추가하기</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="row sb" style="margin-bottom:12px;">
        <div class="section-title" style="margin:0;">콘텐츠 목록</div>
        <div class="row" style="gap:8px;">
          <input type="date" id="bulkDate" style="padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fafafa;outline:none;" />
          <button class="btn btn-primary btn-sm" onclick="bulkUpdateDate()">일괄 수정</button>
          <button class="btn btn-outline btn-sm" onclick="toggleAllCheck()">전체 선택</button>
        </div>
      </div>
      <div id="adminContentList"><div class="empty">등록된 콘텐츠가 없습니다</div></div>
    </div>
  </div>

  <!-- 신청/취소 현황 -->
  <div id="tab1" class="tab-pane">
    <!-- 학번 검색 -->
    <div class="card">
      <div style="font-size:13px;color:#888;font-weight:500;margin-bottom:8px;">학번으로 검색</div>
      <div class="row">
        <input type="text" id="adminSidInput" placeholder="학번 입력" maxlength="20"
          style="flex:1;" onkeydown="if(event.key==='Enter') searchStudentStatus()" />
        <button class="btn btn-primary btn-sm" onclick="searchStudentStatus()" style="padding:10px 18px;">검색</button>
      </div>
    </div>
    <!-- 검색 결과 -->
    <div id="studentStatusResult" style="display:none;"></div>
    <!-- 전체 현황 테이블 -->
    <div class="card">
      <div class="row sb" style="margin-bottom:1rem;">
        <div class="section-title" style="margin:0;">전체 현황</div>
        <button class="btn btn-outline btn-sm" onclick="exportExcel()">엑셀 다운로드</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr id="tblHead"></tr></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 변경 처리 -->
  <div id="tab2" class="tab-pane">
    <div class="card">
      <div class="row sb" style="margin-bottom:0.75rem;">
        <div class="section-title" style="margin:0;">변경 처리 현황</div>
        <button id="filterBtn" onclick="toggleFilter()" style="font-size:12px;padding:6px 14px;border-radius:20px;border:1.5px solid #ED0081;background:#fff;color:#ED0081;cursor:pointer;font-weight:600;">미처리만 보기</button>
      </div>
      <div id="monthFilters" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0.875rem;padding-bottom:0.75rem;border-bottom:1px solid #f0f0ee;"></div>
      <div id="changeList"><div class="empty">데이터를 불러오는 중...</div></div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════
     ADMIN LOGIN MODAL
══════════════════════════════ -->
<div id="loginModal" class="overlay">
  <div class="modal">
    <h2>관리자 로그인</h2>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="이메일 입력" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" />
    </div>
    <div id="loginMsg" class="msg" style="margin-bottom:10px;"></div>
    <button class="btn btn-primary btn-full" onclick="adminLogin()">로그인</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="closeModal()">취소</button>
  </div>
</div>

async function seedContentsIfEmpty() {
  // 이미 새 데이터(ko_crux_1)가 있으면 스킵
  const check = await db.collection("contents").doc("sc_crux_i_1").get();
  if (check.exists) return;

  // 500개 이하라 단일 배치로 처리
  const batch = db.batch();
  INITIAL_CONTENTS.forEach(item => {
    const ref = db.collection("contents").doc(item.id);
    batch.set(ref, {
      name:     item.name,
      category: item.category,
      order:    item.order,
      deliveryDate: item.deliveryDate || null,
      refundAvailableFrom: null
    });
  });
  await batch.commit();
  console.log("초기 콘텐츠 설정 완료: 107개");
}

}
function today() { return new Date().toISOString().slice(0, 10); }

/* ── STUDENT: lookup ── */
async function lookupStudent() {
  const sid = document.getElementById("sidInput").value.trim();
  if (!sid) { setMsg("lookupMsg", "학번을 입력해주세요.", "error"); return; }

  const btn = document.getElementById("lookupBtn");
  btn.disabled = true;
  setMsg("lookupMsg", "조회 중...", "loading");

  try {
    const doc = await db.collection("students").doc(sid).get();

    if (!doc.exists) { setMsg("lookupMsg", "해당 학번을 찾을 수 없습니다.", "error"); return; }

    const data = doc.data();
    student = { id: sid, name: data.name, ban: data.ban, group: data.group, subjectType: data.subjectType || "", subject1: data.subject1 || "", subject2: data.subject2 || "" };
    setMsg("lookupMsg", "");

    document.getElementById("disp_name").textContent  = student.name;
    document.getElementById("disp_ban").textContent   = student.ban + "반";
    document.getElementById("disp_group").textContent = student.group + "그룹";
    document.getElementById("inputGuide").textContent = '신청/취소 선택 후 "최종 저장" 버튼 눌러야 반영됩니다.';
    document.getElementById("inputGuide").style.color = "#888";
    document.getElementById("inputGuide").style.fontSize = "12px";
    document.getElementById("inputGuide").style.fontWeight = "400";
    document.getElementById("disp_type").style.display = "none";
    // 탐구 과목명 뱃지
    const t1el = document.getElementById("disp_t1");
    const t2el = document.getElementById("disp_t2");
    if (student.subject1) { t1el.textContent = student.subject1; t1el.style.display = ""; } else t1el.style.display = "none";
    if (student.subject2) { t2el.textContent = student.subject2; t2el.style.display = ""; } else t2el.style.display = "none";
    document.getElementById("studentInfoCard").style.display = "";

    await loadContentsAndPrev();
    renderNotice();
    renderContents();
  } catch(err) {
    setMsg("lookupMsg", "조회 실패: " + err.message, "error");
  } finally {
    btn.disabled = false;
  }
}

/* ── STUDENT: load ── */
async function loadContentsAndPrev() {
  const [cSnap, sDoc, settingDoc, priceSnap] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").doc(student.id).get(),
    db.collection("settings").doc("refund").get(),
    db.collection("settings").doc("prices").get()
  ]);
  contents     = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  selections   = sDoc.exists ? (sDoc.data().selections || {}) : {};
  refundCutoff = settingDoc.exists ? (settingDoc.data().cutoffDate || null) : null;
  seriesPrices = priceSnap.exists ? priceSnap.data() : { ...DEFAULT_PRICES };
}

/* ── STUDENT: render ── */
function getScienceStatus() {
  if (!student) return { countI: 0, countII: 0 };
  const t1 = student.subject1 || '';
  const t2 = student.subject2 || '';
  const countI  = (t1.includes('Ⅰ') ? 1 : 0) + (t2.includes('Ⅰ') ? 1 : 0);
  const countII = (t1.includes('Ⅱ') ? 1 : 0) + (t2.includes('Ⅱ') ? 1 : 0);
  return { countI, countII };
}

// 시리즈별 과학 과목 블락 여부 (subType: 'Ⅰ' | 'Ⅱ' | null)
function isScienceBlocked(series, subType) {
  const { countI, countII } = getScienceStatus();
  if (series === 'CRUX 과학') {
    if (subType === 'Ⅰ') return countI === 0;
    if (subType === 'Ⅱ') return countII === 0;
    return countI === 0 && countII === 0;
  }
  if (series === 'CIRCUIT 과학Ⅰ') return countI === 0;
  return false;
}

function formatDateKR(dateStr) {
  if (!dateStr) return "";
  const [, m, d] = dateStr.split("-");
  return `${parseInt(m)}월 ${parseInt(d)}일`;
}

function getSeriesName(name) {
  const base = name.replace(/\s+[\d~·\-]+회$/, "").trim();
  if (base === "CRUX 공통국어" || base === "CRUX 화작·언매") return "CRUX 국어";
  if (base.startsWith("CONNEX 수학")) return "CONNEX 수학";
  if (base === "CRUX 과학Ⅰ") return "CRUX 과학Ⅰ";
  if (base === "CRUX 과학Ⅱ") return "CRUX 과학Ⅱ";
  if (base === "CRUX 과학") return "CRUX 과학Ⅰ"; // 구버전 호환
  if (base === "CIRCUIT 과학" || base === "CIRCUIT 과학Ⅰ") return "CIRCUIT 과학Ⅰ";
  return base;
}

// 선택키 → 화면 표시명 (배열이면 여러 행)
const SERIES_DISPLAY = {
  "CIRCUIT 과학Ⅰ": ["CIRCUIT 과학Ⅰ"],
};
function getDisplayNames(series) {
  return SERIES_DISPLAY[series] || [series];
}

function getFirstRound(name) {
  const m = name.match(/([\d~·\-]+회)$/);
  return m ? m[1] : name;
}

function renderNotice() {
  const el = document.getElementById("refundNotice");
  if (!refundCutoff) { el.style.display = "none"; return; }

  const refundable = contents
    .filter(c => c.deliveryDate && c.deliveryDate > refundCutoff)
    .sort((a, b) => a.order - b.order);

  if (!refundable.length) { el.style.display = "none"; return; }

  // 전체 시리즈 목록 구성 — 미래 배부 항목이 하나라도 있으면 환불 가능
  const allSeriesMap = new Map();
  contents.sort((a,b) => a.order - b.order).forEach(item => {
    const series = getSeriesName(item.name);
    if (!allSeriesMap.has(series)) {
      allSeriesMap.set(series, { firstRefundable: null, hasAnyItem: false });
    }
    const entry = allSeriesMap.get(series);
    entry.hasAnyItem = true;
    // 배부일이 가장 빠른 환불 가능 항목을 firstRefundable로
    if (item.deliveryDate && item.deliveryDate > refundCutoff) {
      if (!entry.firstRefundable || item.deliveryDate < entry.firstRefundable.deliveryDate) {
        entry.firstRefundable = item;
      }
    }
  });

  // 카테고리 순서 정의
  const CAT_ORDER = ["국어", "수학", "영어", "과학탐구"];
  const catColors = { "국어": "#2BADA0", "수학": "#3b6fd4", "영어": "#e67e22", "과학탐구": "#9b59b6" };

  // 시리즈에 카테고리 정보 추가
  const seriesCategory = new Map();
  contents.forEach(item => {
    const series = getSeriesName(item.name);
    if (!seriesCategory.has(series)) seriesCategory.set(series, item.category || "기타");
  });

  // 카테고리별로 그룹핑
  const catGroups = {};
  allSeriesMap.forEach(({ firstRefundable, hasAnyItem }, series) => {
    const cat = seriesCategory.get(series) || "기타";
    if (!catGroups[cat]) catGroups[cat] = [];
    catGroups[cat].push({ series, firstRefundable, hasAnyItem });
  });

  const disabledStyle = "opacity:0.3;cursor:not-allowed;padding:7px 14px;font-size:13px;font-weight:500;border-radius:8px;border:1.5px solid #e0e0e0;background:#fafafa;color:#ccc;";

    const color = catColors[cat] || "#888";
    // 다음 배부일 빠른 순 정렬, 배부 완료는 아래로

      if (!a.firstRefundable && !b.firstRefundable) return 0;
      if (!a.firstRefundable) return 1;
      if (!b.firstRefundable) return -1;
      return a.firstRefundable.deliveryDate.localeCompare(b.firstRefundable.deliveryDate);

function pick(cid, val, btn) {
  selections[cid] = val;
  btn.closest(".sel-row").querySelectorAll(".sel-btn").forEach(b =>
    b.classList.remove("sel-refund", "sel-apply")
  );
  if (val === "환불") btn.classList.add("sel-refund");
  else               btn.classList.add("sel-apply");
}

function pickSeries(series, val) {
  selections[series] = val;
  touchedSeries.add(series);
  // Ⅰ+Ⅱ 세트: 하나 변경하면 둘 다 연동
  const { countI, countII } = getScienceStatus();
  if (countI >= 1 && countII >= 1) {
    if (series === "CRUX 과학Ⅰ") { selections["CRUX 과학Ⅱ"] = val; touchedSeries.add("CRUX 과학Ⅱ"); }
    if (series === "CRUX 과학Ⅱ") { selections["CRUX 과학Ⅰ"] = val; touchedSeries.add("CRUX 과학Ⅰ"); }
  }
  renderNotice();
}

function resetStudentView() {
  student       = null;
  contents      = [];
  selections    = {};
  refundCutoff  = null;
  touchedSeries = new Set();
  document.getElementById("sidInput").value                = "";
  document.getElementById("studentInfoCard").style.display = "none";
  document.getElementById("refundNotice").style.display    = "none";
  document.getElementById("contentsSection").style.display = "none";

  hint.textContent      = "학생증을 태깅해주세요";

/* ── STUDENT: submit ── */
async function submitSelections() {
  if (!student) return;
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  setMsg("submitMsg", "저장 중...", "loading");
  try {
    // 실제로 버튼을 누른 콘텐츠만 필터
    const touchedSelections = {};
    touchedSeries.forEach(series => {
      if (selections[series]) touchedSelections[series] = selections[series];
    });

    if (Object.keys(touchedSelections).length === 0) {
      setMsg("submitMsg", "변경한 콘텐츠가 없습니다.", "error");
      btn.disabled = false;
      return;
    }

    const submitData = {
      studentId: student.id, name: student.name,
      ban: student.ban, group: student.group,
      subject1: student.subject1 || "",
      subject2: student.subject2 || "",
      selections: touchedSelections,
      cutoffDate: refundCutoff || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    // 현재 선택값 유지 (재방문 시 불러오기용)
    await db.collection("submissions").doc(student.id).set({
      studentId: student.id, name: student.name,
      ban: student.ban, group: student.group,
      selections,
      cutoffDate: refundCutoff || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // 이력 추가 저장 (touched만)
    await db.collection("submissionHistory").add(submitData);
    toast("✓ 저장되었습니다");
    setTimeout(() => resetStudentView(), 1500);
  } catch(err) {
    setMsg("submitMsg", "저장 실패: " + err.message, "error");
    console.error("submitSelections error:", err);
  } finally {
    btn.disabled = false;
  }
}

/* ── ADMIN: auth ── */
async function adminLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  setMsg("loginMsg", "로그인 중...", "loading");
  try {
    await auth.signInWithEmailAndPassword(email, pw);
    closeModal();
    document.getElementById("studentView").style.display = "none";

    loadAdminContents();
    loadSubmissions();
  } catch {
    setMsg("loginMsg", "이메일 또는 비밀번호를 확인해주세요.", "error");
  }
}

async function adminLogout() {
  await auth.signOut();
  document.getElementById("adminView").style.display   = "none";
  document.getElementById("studentView").style.display = "";
}

/* ── ADMIN: refund cutoff ── */
async function saveCutoffDate() {
  const val = document.getElementById("cutoffDate").value;
  if (!val) { setMsg("cutoffMsg", "날짜를 선택해주세요.", "error"); return; }
  await db.collection("settings").doc("refund").set({ cutoffDate: val });
  setMsg("cutoffMsg", "✓ 저장되었습니다", "success");
  setTimeout(() => setMsg("cutoffMsg", ""), 2000);
}

async function loadCutoffDate() {
  const doc = await db.collection("settings").doc("refund").get();
  if (doc.exists && doc.data().cutoffDate) {
    document.getElementById("cutoffDate").value = doc.data().cutoffDate;
  }
}

/* ── ADMIN: contents ── */
async function addContent() {
  const name     = document.getElementById("newName").value.trim();
  const delivery = document.getElementById("newDelivery").value;
  const refund   = document.getElementById("newRefund").value;
  if (!name) { toast("콘텐츠 이름을 입력해주세요"); return; }

  const snap = await db.collection("contents").orderBy("order","desc").limit(1).get();
  const lastOrder = snap.empty ? 0 : (snap.docs[0].data().order || 0);

  const category = document.getElementById("newCategory").value;
  await db.collection("contents").add({
    name,
    category,
    deliveryDate: delivery || null,
    order: lastOrder + 1,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newName").value     = "";
  document.getElementById("newDelivery").value = "";
  toast("콘텐츠가 추가되었습니다");
  loadAdminContents();
}

async function deleteContent(id) {
  if (!confirm("정말 삭제하시겠습니까?")) return;
  await db.collection("contents").doc(id).delete();
  toast("삭제되었습니다");
  loadAdminContents();
}

async function loadAdminContents() {

    db.collection("contents").orderBy("order").get(),
    db.collection("settings").doc("prices").get()
  ]);
  const adminPrices = priceDoc.exists ? priceDoc.data() : { ...DEFAULT_PRICES };
  const el   = document.getElementById("adminContentList");
  if (snap.empty) { el.innerHTML = '<div class="empty">등록된 콘텐츠가 없습니다</div>'; return; }

  const CAT_ORDER = ["국어", "수학", "영어", "과학탐구"];
  const catColors = { "국어": "#2BADA0", "수학": "#3b6fd4", "영어": "#e67e22", "과학탐구": "#9b59b6" };

  // 카테고리별 그룹핑 → 시리즈별 그룹핑
  const catGroups = {};
  snap.docs.forEach(d => {
    const data = { id: d.id, ...d.data() };
    const cat  = data.category || "기타";
    const series = getSeriesName(data.name);
    if (!catGroups[cat]) catGroups[cat] = {};
    if (!catGroups[cat][series]) catGroups[cat][series] = [];
    catGroups[cat][series].push(data);
  });

  el.innerHTML = CAT_ORDER.filter(cat => catGroups[cat]).map(cat => {
    const color = catColors[cat] || "#888";
    const seriesHtml = Object.entries(catGroups[cat]).map(([series, items]) => {
      const itemRows = items.map(item => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 8px 6px 10px;border-bottom:1px solid #f8f8f6;">
          <input type="checkbox" class="content-check" data-id="${item.id}"
            style="width:16px;height:16px;accent-color:#2BADA0;flex-shrink:0;cursor:pointer;" />
          <div style="flex:1;font-size:13px;color:#555;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</div>
          <input type="date" value="${item.deliveryDate || ''}"
            style="padding:4px 6px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fafafa;outline:none;width:130px;flex-shrink:0;"
            onchange="updateDeliveryDate('${item.id}', this.value)" />
          <button class="btn btn-danger btn-sm" onclick="deleteContent('${item.id}')" style="padding:5px 10px;">삭제</button>
        </div>`).join("");

      return `
        <div style="margin-bottom:10px;border:1px solid #ebebeb;border-radius:10px;overflow:hidden;">
          <div style="padding:8px 12px;background:#f8f8f6;border-bottom:1px solid #ebebeb;display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <span style="font-size:13px;font-weight:700;color:#333;">${series}</span>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              <input type="number" placeholder="금액" value="${adminPrices[series]||''}"
                style="width:90px;padding:4px 8px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fff;outline:none;text-align:right;"
                onchange="updateSeriesPrice('${series}', this.value)" />
              <span style="font-size:11px;color:#aaa;">원</span>
            </div>
          </div>
          ${itemRows}
        </div>`;
    }).join("");

    return `
      <div style="margin-bottom:1.25rem;">
        <div style="font-size:12px;font-weight:700;color:${color};letter-spacing:0.05em;padding:4px 0 6px;border-bottom:2px solid ${color};margin-bottom:10px;">${cat}</div>
        ${seriesHtml}
      </div>`;
  }).join("");
}

async function updateDeliveryDate(id, date) {
  await db.collection("contents").doc(id).update({ deliveryDate: date || null });
  toast("배부일이 수정되었습니다");
}

async function updateSeriesPrice(series, val) {
  const price = parseInt(val) || 0;
  await db.collection("settings").doc("prices").set({ [series]: price }, { merge: true });
  seriesPrices[series] = price;
  toast(`${series} 금액 저장: ${price.toLocaleString()}원`);
}

async function bulkUpdateDate() {
  const date = document.getElementById("bulkDate").value;
  if (!date) { toast("날짜를 먼저 선택해주세요"); return; }
  const checked = document.querySelectorAll(".content-check:checked");
  if (!checked.length) { toast("콘텐츠를 먼저 선택해주세요"); return; }
  const batch = db.batch();
  checked.forEach(cb => {
    batch.update(db.collection("contents").doc(cb.dataset.id), { deliveryDate: date });
  });
  await batch.commit();
  toast(`✓ ${checked.length}개 배부일 수정 완료`);
  loadAdminContents();
}

function toggleAllCheck() {
  const all = document.querySelectorAll(".content-check");
  const allChecked = Array.from(all).every(cb => cb.checked);
  all.forEach(cb => cb.checked = !allChecked);
}

/* ── ADMIN: 학번 검색 ── */
async function searchStudentStatus() {
  const sid = document.getElementById("adminSidInput").value.trim();
  const el  = document.getElementById("studentStatusResult");
  if (!sid) { el.style.display = "none"; return; }

  el.style.display = "";
  el.innerHTML = '<div class="empty">검색 중...</div>';

  const [studentDoc, subDoc, histSnap, cSnap] = await Promise.all([
    db.collection("students").doc(sid).get(),
    db.collection("submissions").doc(sid).get(),
    db.collection("submissionHistory").where("studentId","==",sid).orderBy("updatedAt","desc").get(),
    db.collection("contents").orderBy("order").get()
  ]);

  if (!studentDoc.exists) {
    el.innerHTML = '<div class="card empty">해당 학번을 찾을 수 없습니다.</div>';
    return;
  }

  const stu      = studentDoc.data();
  const subs     = subDoc.exists ? (subDoc.data().selections || {}) : {};
  const contents = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // 시리즈별 최신 이력 맵 { series: { val, round, updatedAt } }
  const historyMap = {};
  histSnap.docs.forEach(d => {
    const h = d.data();
    const updatedAt = h.updatedAt?.toDate
      ? h.updatedAt.toDate().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})
      : "";
    Object.entries(h.selections || {}).forEach(([series, val]) => {
      if (!historyMap[series]) {
        // 해당 cutoffDate 기준으로 마지막 회차 찾기
        const cutoff = h.cutoffDate || null;
        let lastRound = "";
        if (cutoff) {
          const seriesItems = contents
            .filter(item => getSeriesName(item.name) === series && item.deliveryDate && item.deliveryDate > cutoff)
            .sort((a,b) => a.order - b.order);
          if (seriesItems.length) lastRound = getFirstRound(seriesItems[0].name) + "부터";
        }
        historyMap[series] = { val, updatedAt, lastRound };
      }
    });
  });

  // 카테고리 순서
  const CAT_ORDER  = ["국어","수학","영어","과학탐구"];
  const catColors  = { "국어":"#2BADA0","수학":"#3b6fd4","영어":"#e67e22","과학탐구":"#9b59b6" };

  // 시리즈 → 카테고리 맵
  const seriesCatMap = {};
  contents.forEach(item => {
    const s = getSeriesName(item.name);
    if (!seriesCatMap[s]) seriesCatMap[s] = item.category || "기타";
  });

  // 카테고리별 그룹핑
  const catGroups = {};
  const allSeries = new Set([...Object.keys(subs), ...Object.keys(historyMap)]);
  allSeries.forEach(series => {
    const cat = seriesCatMap[series] || "기타";
    if (!catGroups[cat]) catGroups[cat] = [];
    if (!catGroups[cat].includes(series)) catGroups[cat].push(series);
  });

  const catRows = CAT_ORDER.filter(cat => catGroups[cat]).map(cat => {
    const color = catColors[cat] || "#888";
    const rows = catGroups[cat].map(series => {
      const curVal  = subs[series];
      const hist    = historyMap[series];
      const dispNames = getDisplayNames(series).join(" · ");

      const valColor = curVal === "취소" || curVal === "환불" ? "#e5534b" : "#2BADA0";
      const valBadge = curVal
        ? `<span style="font-size:12px;font-weight:700;color:${valColor};">[${curVal}]</span>`
        : `<span style="font-size:12px;color:#ccc;">[미선택]</span>`;

      const histStr = hist
        ? `<span style="font-size:11px;color:#aaa;margin-left:6px;">최근: ${hist.lastRound || ""} · ${hist.updatedAt}</span>`
        : "";

      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f3;flex-wrap:wrap;">
        ${valBadge}
        <span style="font-size:13px;color:#333;">${dispNames}</span>
        ${histStr}
      </div>`;
    }).join("");

    return `<div style="margin-bottom:1rem;">
      <div style="font-size:12px;font-weight:700;color:${color};padding:4px 0 6px;border-bottom:2px solid ${color};margin-bottom:4px;">${cat}</div>
      ${rows}
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
        <span style="font-size:16px;font-weight:700;">${stu.name || stu.이름 || ""}</span>
        <span class="badge badge-teal">${stu.ban || stu.반 || ""}반</span>
        <span class="badge badge-gray">${stu.group || stu.그룹 || ""}그룹</span>
        <span style="font-size:12px;color:#bbb;">${sid}</span>
      </div>
      ${catRows || '<div class="empty">선택 내역이 없습니다.</div>'}
    </div>`;
}

/* ── ADMIN: submissions ── */
async function loadSubmissions() {
  const [cSnap, sSnap] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").get()
  ]);
  const cols = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const subs = sSnap.docs.map(d => d.data());

  document.getElementById("tblHead").innerHTML =
    `<th>학번</th><th>이름</th><th>반</th><th>그룹</th>` +
    cols.map(c => `<th>${c.name}</th>`).join("");

  const body = document.getElementById("tblBody");
  if (!subs.length) {
    body.innerHTML = `<tr><td colspan="${4 + cols.length}" style="text-align:center;color:#ccc;padding:1.5rem;">데이터가 없습니다</td></tr>`;
    return;
  }
  body.innerHTML = subs.map(s => `
    <tr>
      <td>${s.studentId}</td><td>${s.name}</td><td>${s.ban}</td><td>${s.group}</td>
      ${cols.map(c => {
        const v = s.selections?.[c.id];
        if (v === "환불") return `<td class="tag-r">취소</td>`;
        if (v === "신청") return `<td class="tag-a">신청</td>`;
        return `<td style="color:#ddd;">-</td>`;
      }).join("")}
    </tr>`).join("");
}

/* ── ADMIN: 변경 처리 ── */
let _showOnlyUnprocessed = false;

function toggleFilter() {
  _showOnlyUnprocessed = !_showOnlyUnprocessed;
  const btn = document.getElementById("filterBtn");
  btn.style.background = _showOnlyUnprocessed ? "#ED0081" : "#fff";
  btn.style.color      = _showOnlyUnprocessed ? "#fff" : "#ED0081";
  btn.textContent      = _showOnlyUnprocessed ? "전체 보기" : "미처리만 보기";
  loadChanges();
}

async function onMonthToggle(ym, checked) {
  // 1. 체크박스 스타일 즉시 업데이트
  const label = document.querySelector(`[data-month="${ym}"]`)?.closest("label");
  if (label) {
    label.style.borderColor = checked ? "#ED0081" : "#e0e0e0";
    label.style.background  = checked ? "#fdf0f7" : "#fff";
  }

  // 2. 해당 월 행 표시/숨김
  document.querySelectorAll(`.month-row[data-month="${ym}"]`).forEach(row => {
    row.style.display = checked ? "flex" : "none";
  });

  // 3. 합계 즉시 재계산
  document.querySelectorAll(".student-card").forEach(card => {
    let total = 0;
    card.querySelectorAll(".month-row[data-amount]").forEach(row => {
      if (row.style.display !== "none") {
        total += parseInt(row.dataset.amount || "0");
      }
    });
    const totalEl = card.querySelector(".monthly-total");
    if (totalEl) {
      if (total === 0) { totalEl.style.display = "none"; return; }
      totalEl.style.display = "";
      totalEl.style.color = total < 0 ? "#e5534b" : "#2BADA0";
      totalEl.textContent = `표시 합계: ${total > 0 ? "+" : ""}${total.toLocaleString()}원`;
    }
  });

  // 4. Firestore 저장
  const allChecks = document.querySelectorAll("#monthFilters input[type=checkbox]");
  const visibleMonths = Array.from(allChecks).filter(cb => cb.checked).map(cb => cb.dataset.month);
  await db.collection("settings").doc("monthFilter").set({ visibleMonths });
}

async function loadChanges() {
  const el = document.getElementById("changeList");
  el.innerHTML = '<div class="empty">불러오는 중...</div>';

  const [sSnap, cSnap, settingDoc, monthDoc] = await Promise.all([
    db.collection("submissionHistory").orderBy("updatedAt","desc").get(),
    db.collection("contents").orderBy("order").get(),
    db.collection("settings").doc("refund").get(),
    db.collection("settings").doc("monthFilter").get()
  ]);

  const cutoff   = settingDoc.exists ? settingDoc.data().cutoffDate : null;
  const contents = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const monthNames = {"01":"1월","02":"2월","03":"3월","04":"4월","05":"5월","06":"6월","07":"7월","08":"8월","09":"9월","10":"10월","11":"11월","12":"12월"};

  const seriesFirstMap = {};
  contents.sort((a,b) => a.order - b.order).forEach(item => {
    const series = getSeriesName(item.name);
    if (!seriesFirstMap[series] && cutoff && item.deliveryDate && item.deliveryDate > cutoff) {
      seriesFirstMap[series] = item;
    }
  });

  let changed = sSnap.docs
    .map(d => ({ docId: d.id, ...d.data() }))
    .filter(s => s.selections && Object.keys(s.selections).length > 0);

  // 미처리만 보기 필터 (해당 시점 기준)
  if (_showOnlyUnprocessed) {
    changed = changed.filter(s => {
      const period = s.cutoffDate || "기준일 미설정";
      return !(s.processedByPeriod && s.processedByPeriod[period]);
    });
  }

  if (!changed.length) {
    el.innerHTML = `<div class="empty">${_showOnlyUnprocessed ? "미처리 내역이 없습니다 🎉" : "변경 내역이 없습니다"}</div>`;
    return;
  }

  // submissionHistory는 이미 updatedAt desc 정렬

  const priceDoc2 = await db.collection("settings").doc("prices").get();
  const priceMap  = priceDoc2.exists ? priceDoc2.data() : { ...DEFAULT_PRICES };

  // 전체 월 목록 수집
  const allMonths = new Set();
  changed.forEach(s => {
    contents.forEach(item => {
      if (item.deliveryDate && s.cutoffDate && item.deliveryDate > s.cutoffDate)
        allMonths.add(item.deliveryDate.slice(0, 7));
    });
  });
  const sortedMonths = Array.from(allMonths).sort();

  // Firestore 저장값 or 전체 기본 표시
  const savedMonths   = monthDoc.exists ? (monthDoc.data().visibleMonths || null) : null;
  const visibleMonths = new Set(savedMonths || sortedMonths);

  // 체크박스 렌더링
  const mfEl = document.getElementById("monthFilters");
  if (mfEl) {
    mfEl.innerHTML = sortedMonths.map(m => {
      const label   = monthNames[m.slice(5,7)] || m;
      const checked = visibleMonths.has(m);
      return `<label style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;cursor:pointer;padding:3px 6px;border:1px solid ${checked?"#ED0081":"#e0e0e0"};border-radius:16px;background:${checked?"#fdf0f7":"#fff"};">
        <input type="checkbox" data-month="${m}" ${checked?"checked":""} style="accent-color:#ED0081;width:14px;height:14px;"
          onchange="onMonthToggle('${m}',this.checked)"> ${label}
      </label>`;
    }).join("");
  }

  el.innerHTML = changed.map(s => {
    const period = s.cutoffDate || "기준일 미설정";

    // 학생 탐구 과목 수
    const sCountI  = ((s.subject1||"").includes("Ⅰ")?1:0) + ((s.subject2||"").includes("Ⅰ")?1:0);
    const sCountII = ((s.subject1||"").includes("Ⅱ")?1:0) + ((s.subject2||"").includes("Ⅱ")?1:0);

    let totalAmount = 0;
    const changeList = Object.entries(s.selections || {})
      .flatMap(([series, val]) => {
        if (!s.cutoffDate) return [];

        const isCancel = val === "취소" || val === "환불";
        const valColor = isCancel ? "#e5534b" : "#2BADA0";
        const valText  = isCancel ? "취소" : "신청";
        const priceKey = series === "CRUX 과학Ⅰ" ? "CRUX 과학" : series;
        const price    = priceMap[priceKey] || DEFAULT_PRICES[priceKey] || 0;
        const sciMult  = series === "CRUX 과학Ⅰ" || series === "CIRCUIT 과학Ⅰ" ? (sCountI || 1)
                       : series === "CRUX 과학Ⅱ" ? (sCountII || 1) : 1;
        const dispNames = getDisplayNames(series).join(" · ");

        // 과학 시리즈 과목명
        let sciSubjects = "";
        if (series === "CRUX 과학Ⅰ" || series === "CIRCUIT 과학Ⅰ") {
          const subs = [s.subject1, s.subject2].filter(v => v && v.includes("Ⅰ"));
          if (subs.length) sciSubjects = ` (${subs.join(", ")})`;
        } else if (series === "CRUX 과학Ⅱ") {
          const subs = [s.subject1, s.subject2].filter(v => v && v.includes("Ⅱ"));
          if (subs.length) sciSubjects = ` (${subs.join(", ")})`;
        }

        // 기준일 이후 항목을 월별로 그룹핑
        const monthlyItems = {};
        contents
          .filter(item => getSeriesName(item.name) === series && item.deliveryDate && item.deliveryDate > s.cutoffDate)
          .sort((a,b) => a.order - b.order)
          .forEach(item => {
            const ym = item.deliveryDate.slice(0,7);
            if (!monthlyItems[ym]) monthlyItems[ym] = [];
            monthlyItems[ym].push(item);
          });

        if (Object.keys(monthlyItems).length === 0) return [];

        return Object.entries(monthlyItems)
          .sort(([a],[b]) => a.localeCompare(b))
          .map(([ym, items]) => {
            const mm      = ym.slice(5,7);
            const mLabel  = monthNames[mm] || ym;
            const count   = items.length;
            const amount  = price * count * sciMult;
            const firstRound = getFirstRound(items[0].name);
            const isSciSeries = series === "CRUX 과학Ⅰ" || series === "CRUX 과학Ⅱ" || series === "CIRCUIT 과학Ⅰ";
            const multStr = isSciSeries ? `×${sciMult}과목` : "";
            const amountStr = price
              ? `<span style="color:${valColor};font-size:12px;font-weight:600;">${isCancel?"-":"+"}${amount.toLocaleString()}원 (${count}개×${price.toLocaleString()}원${multStr})</span>`
              : "";
            const isVisible = visibleMonths.has(ym);
            totalAmount += isVisible ? (isCancel ? -amount : amount) : 0;

            return `<div class="month-row" data-month="${ym}" data-amount="${isCancel?-amount:amount}" style="display:${isVisible?"flex":"none"};align-items:center;gap:6px;font-size:13px;color:#555;padding:3px 0;flex-wrap:wrap;">
              <span style="font-weight:700;color:${valColor};min-width:30px;">[${valText}]</span>
              <span>${dispNames}<span style="color:#888;font-size:12px;">${sciSubjects}</span></span>
              <span style="color:#aaa;font-size:12px;">${firstRound}부터</span>
              ${amountStr}
              <span style="font-size:11px;background:#f0f0ee;color:#888;padding:2px 7px;border-radius:10px;">${mLabel}</span>
            </div>`;
          });
      }).join("");

    const totalColor  = totalAmount < 0 ? "#e5534b" : "#2BADA0";
    const totalStr    = totalAmount !== 0
      ? `<div class="monthly-total" style="margin-top:8px;padding:6px 10px;background:#f8f8f6;border-radius:8px;font-size:13px;font-weight:700;color:${totalColor};text-align:right;">표시 합계: ${totalAmount>0?"+":""}${totalAmount.toLocaleString()}원</div>`
      : "";

    const processedMap  = s.processedByPeriod    || {};
    const processed     = processedMap[period]   || false;
    const processedAt   = (s.processedAtByPeriod   && s.processedAtByPeriod[period])   || null;
    const unprocessedAt = (s.unprocessedAtByPeriod && s.unprocessedAtByPeriod[period]) || null;
    const memo          = (s.memoByPeriod && s.memoByPeriod[period]) || "";
    const submittedAt   = s.updatedAt?.toDate
      ? s.updatedAt.toDate().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})
      : "";

    return `
      <div class="student-card" style="border:1px solid ${processed?'#e5e5e3':'#fbd4e8'};border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem;background:${processed?'#fafafa':'#fff'};">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap;">
              <span style="font-size:15px;font-weight:700;color:${processed?'#aaa':'#1a1a1a'};">${s.name}</span>
              <span style="font-size:12px;color:#888;">${s.ban}반 · ${s.group}그룹</span>
              <span style="font-size:11px;color:#bbb;">${s.studentId}</span>
            </div>
            ${submittedAt ? `<div style="font-size:11px;color:#ED0081;font-weight:600;margin-bottom:8px;">신청/취소 시점: ${submittedAt}${period !== "기준일 미설정" ? " · 기준일 " + formatDateKR(period) : ""}</div>` : ""}
            ${changeList}
            ${totalStr}
            <div style="margin-top:8px;">
              <input type="text" placeholder="비고 입력 후 Enter" value="${memo}"
                style="width:100%;padding:6px 10px;font-size:12px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa;outline:none;color:#555;"
                onkeydown="if(event.key==='Enter'){saveMemo('${s.docId}','${period}',this.value);this.blur();}"
                onblur="saveMemo('${s.docId}','${period}',this.value)" />
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;">
            <button onclick="toggleProcessed('${s.docId}','${period}',${!processed})"
              style="padding:8px 14px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:none;
                background:${processed?'#f0f0ee':'#ED0081'};color:${processed?'#aaa':'#fff'};">
              ${processed ? '처리완료 ✓' : '미처리'}
            </button>
            ${processed && processedAt   ? `<div style="font-size:10px;color:#2BADA0;text-align:center;">처리: ${processedAt}</div>`   : ""}
            ${!processed && unprocessedAt ? `<div style="font-size:10px;color:#e5534b;text-align:center;">취소: ${unprocessedAt}</div>` : ""}
          </div>
        </div>
      </div>`;
  }).join("");
}


async function toggleProcessed(docId, period, newVal) {
  const now = new Date().toLocaleString("ko-KR", {
    month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"
  });
  const updates = {
    [`processedByPeriod.${period}`]: newVal
  };
  if (newVal) {
    updates[`processedAtByPeriod.${period}`]   = now;
    updates[`unprocessedAtByPeriod.${period}`] = null;
  } else {
    updates[`unprocessedAtByPeriod.${period}`] = now;
    updates[`processedAtByPeriod.${period}`]   = null;
  }
  await db.collection("submissions").doc(docId).update(updates);
  loadChanges();
}

async function saveMemo(docId, period, memo) {
  try {
    await db.collection("submissionHistory").doc(docId).update({
      [`memoByPeriod.${period}`]: memo
    });
    toast("비고 저장됨");
  } catch(e) {
    console.error("saveMemo error:", e);
  }
}

/* ── ADMIN: excel ── */
async function exportExcel() {
  const [cSnap, sSnap] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").get()
  ]);
  const cols = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const subs = sSnap.docs.map(d => d.data());

  const headers = ["학번","이름","반","그룹", ...cols.map(c => c.name)];
  const rows    = subs.map(s => [
    s.studentId, s.name, s.ban, s.group,
    ...cols.map(c => s.selections?.[c.id] || "-")
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "신청취소현황");
  XLSX.writeFile(wb, `CAMPUSM_신청취소_${today()}.xlsx`);
}

/* ── TABS ── */
function switchTab(idx) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === idx));
  document.querySelectorAll(".tab-pane").forEach((p,i) => p.classList.toggle("active", i === idx));
  localStorage.setItem("adminTab", idx);
  if (idx === 1) loadSubmissions();
  if (idx === 2) loadChanges();
}

/* ── AUTH 상태 유지 (F5 후 관리자 유지) ── */
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("studentView").style.display = "none";
    document.getElementById("adminView").style.display   = "";
    const savedTab = parseInt(localStorage.getItem("adminTab") || "0");
    switchTab(savedTab);
    loadCutoffDate();
    loadAdminContents();
  } else {
    document.getElementById("adminView").style.display   = "none";
    document.getElementById("studentView").style.display = "";
  }
});

/* ── KEYBOARD ── */
document.getElementById("sidInput").addEventListener("keydown", e => { if (e.key === "Enter") lookupStudent(); });
document.getElementById("loginPw").addEventListener("keydown",  e => { if (e.key === "Enter") adminLogin(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
