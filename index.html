<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이력 수동 추가</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
  .btn { padding: 12px 24px; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; }
  .btn-primary { background: #2BADA0; color: #fff; }
  label { display:block; font-size:13px; color:#888; margin-bottom:4px; margin-top:12px; }
  input, select { width:100%; padding:8px 10px; font-size:14px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
  #log { margin-top:16px; padding:14px; background:#f8f8f6; border-radius:10px; font-size:13px; line-height:1.8; white-space:pre-wrap; }
</style>
</head>
<body>
<h2>📝 이력 수동 추가</h2>

<label>학번</label>
<input type="text" id="studentId" value="8495" />

<label>기준일</label>
<input type="date" id="cutoffDate" value="2026-04-30" />

<label>신청/취소 시점</label>
<input type="datetime-local" id="updatedAt" value="2026-04-30T00:00" />

<label>결제방법</label>
<select id="paymentMethod">
  <option value="">없음</option>
  <option value="학생">학생</option>
  <option value="학부모">학부모</option>
  <option value="다음달결제">다음달결제</option>
</select>

<label>콘텐츠 (취소할 시리즈 선택)</label>
<div id="seriesCheckboxes" style="display:flex;flex-direction:column;gap:6px;margin-top:6px;max-height:300px;overflow-y:auto;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fafafa;">
  로딩 중...
</div>

<div style="margin-top:20px;">
  <button class="btn btn-primary" onclick="addHistory()">추가</button>
</div>
<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyDrwaQk4j8MM_XRw7zN2wQiEPBZiY4Mxq8",
  authDomain: "contents-1910f.firebaseapp.com",
  projectId: "contents-1910f",
});
const db = firebase.firestore();

function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

// 시리즈 목록 로드
(async () => {
  const snap = await db.collection("contents").orderBy("order").get();
  const seriesSet = new Set();
  const seriesList = [];
  snap.docs.forEach(d => {
    const name = d.data().name || "";
    const base = name.replace(/\s*\d+.*$/, "").trim();
    // getSeriesName 간이 버전
    let series = base;
    if (name.startsWith("CRUX 공통국어") || name.startsWith("CRUX 공통 국어")) series = "CRUX 국어";
    else if (name.startsWith("CRUX 화작")) series = "CRUX 국어";
    else if (name.startsWith("CONNEX 수학")) series = name.includes("수I") ? "CONNEX 수학" : base;
    if (!seriesSet.has(series)) {
      seriesSet.add(series);
      seriesList.push(series);
    }
  });

  const container = document.getElementById("seriesCheckboxes");
  container.innerHTML = seriesList.map(s => `
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
      <input type="checkbox" value="${s}" style="width:15px;height:15px;accent-color:#e5534b;">
      ${s}
    </label>
  `).join("");

  // 기본 체크
  ["CRUX 국어", "CONNEX 수학"].forEach(s => {
    const cb = container.querySelector(`input[value="${s}"]`);
    if (cb) cb.checked = true;
  });
})();

async function addHistory() {
  const studentId = document.getElementById("studentId").value.trim();
  const cutoffDate = document.getElementById("cutoffDate").value;
  const updatedAtVal = document.getElementById("updatedAt").value;
  const paymentMethod = document.getElementById("paymentMethod").value;

  if (!studentId || !cutoffDate) { alert("학번과 기준일을 입력해주세요"); return; }

  const checked = [...document.querySelectorAll("#seriesCheckboxes input:checked")].map(cb => cb.value);
  if (!checked.length) { alert("콘텐츠를 선택해주세요"); return; }

  // 학생 정보 조회
  const stuDoc = await db.collection("students").doc(studentId).get();
  if (!stuDoc.exists) { alert("학생을 찾을 수 없습니다"); return; }
  const stu = stuDoc.data();

  const selections = {};
  checked.forEach(s => { selections[s] = "환불"; });

  const data = {
    studentId,
    name: stu.name || "",
    ban: stu.ban || "",
    group: stu.group || "",
    subject1: stu.subject1 || "",
    subject2: stu.subject2 || "",
    selections,
    cutoffDate,
    paymentMethod: paymentMethod || null,
    updatedAt: firebase.firestore.Timestamp.fromDate(new Date(updatedAtVal)),
  };

  log(`추가 중...\n학번: ${studentId} / ${stu.name}\n기준일: ${cutoffDate}\n콘텐츠: ${checked.join(", ")}`);

  try {
    await db.collection("submissionHistory").add(data);
    log("✅ 추가 완료!");
  } catch(e) {
    log("❌ 실패: " + e.message);
  }
}
</script>
</body>
</html>
