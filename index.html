<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>의대관 콘텐츠 신청/환불</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f4f4f2;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e3;
      padding: 0 1.25rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; }
    .logo span { color: #2BADA0; }
    .admin-toggle {
      font-size: 12px;
      color: #aaa;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .admin-toggle:hover { color: #555; border-color: #bbb; }

    /* ── LAYOUT ── */
    .main { max-width: 660px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.875rem;
    }

    /* ── FORM ELEMENTS ── */
    input[type="text"], input[type="email"],
    input[type="password"], input[type="date"] {
      width: 100%;
      padding: 13px 14px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #2BADA0; background: #fff; }

    .btn {
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      display: inline-block;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary { background: #2BADA0; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #249890; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-danger { background: #e5534b; color: #fff; }
    .btn-danger:hover { background: #cc4b44; }
    .btn-outline { background: #fff; color: #555; border: 1px solid #ddd; }
    .btn-outline:hover { background: #f5f5f3; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-full { width: 100%; text-align: center; }

    /* ── STUDENT INFO ── */
    .student-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .student-name { font-size: 20px; font-weight: 700; }
    .badge { font-size: 13px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
    .badge-teal { background: #e4f5f3; color: #2BADA0; }
    .badge-gray { background: #f0f0ee; color: #666; }

    /* ── CONTENT CARD ── */
    .content-card {
      background: #fff;
      border: 1px solid #e5e5e3;
      border-radius: 14px;
      padding: 1.125rem 1.375rem;
      margin-bottom: 0.75rem;
    }
    .content-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.875rem;
      gap: 0.75rem;
    }
    .content-name { font-size: 16px; font-weight: 600; }
    .content-dates { font-size: 12px; color: #aaa; margin-top: 3px; line-height: 1.7; }
    .refund-tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .refund-on  { background: #e4f5f3; color: #2BADA0; }
    .refund-off { background: #f0f0ee; color: #aaa; }

    /* ── SELECTION BUTTONS ── */
    .sel-row { display: flex; gap: 8px; }
    .sel-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 14px;
      font-weight: 500;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fafafa;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .sel-btn:hover:not(:disabled) { border-color: #ccc; background: #f2f2f0; color: #666; }
    .sel-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .sel-refund { border-color: #e5534b !important; background: #fef3f2 !important; color: #e5534b !important; }
    .sel-apply  { border-color: #2BADA0 !important; background: #e4f5f3 !important; color: #2BADA0 !important; }
    .sel-none   { border-color: #ccc    !important; background: #f0f0ee !important; color: #888    !important; }

    /* ── MESSAGES ── */
    .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
    .msg.error   { color: #e5534b; }
    .msg.success { color: #2BADA0; }
    .msg.loading { color: #aaa; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 380px;
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
    .field { margin-bottom: 0.875rem; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 1px solid #e5e5e3; margin-bottom: 1.125rem; }
    .tab {
      padding: 10px 1.25rem;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab.active { color: #2BADA0; border-bottom-color: #2BADA0; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── ADD FORM ── */
    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.875rem; }
    .add-grid .span2 { grid-column: 1 / -1; }
    .add-grid label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .add-grid input { padding: 10px 12px; font-size: 14px; }

    /* ── CONTENT LIST (admin) ── */
    .cl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0ee;
    }
    .cl-item:last-child { border-bottom: none; }
    .cl-info { flex: 1; }
    .cl-name  { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .cl-dates { font-size: 12px; color: #aaa; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
    th {
      background: #f8f8f6;
      text-align: left;
      padding: 9px 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e5e5e3;
      white-space: nowrap;
    }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0ee; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    .tag-r { color: #e5534b; font-weight: 600; }
    .tag-a { color: #2BADA0; font-weight: 600; }

    /* ── MISC ── */
    .section-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 0.875rem; }
    .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
    .row { display: flex; gap: 10px; align-items: center; }
    .sb  { justify-content: space-between; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .add-grid { grid-template-columns: 1fr; }
      .add-grid .span2 { grid-column: 1; }
    }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ── HEADER ── -->
<div class="header">
  <div class="logo" style="color:#2BADA0;">강남대성기숙 의대관</div>
  <button class="admin-toggle" onclick="openAdminLogin()">관리자</button>
</div>

<!-- ══════════════════════════════
     STUDENT VIEW
══════════════════════════════ -->
<div id="studentView" class="main">

  <div class="card">
    <div style="font-size:13px;color:#888;font-weight:500;margin-bottom:8px;">학번 입력</div>
    <div class="row">
      <input type="text" id="sidInput" placeholder="학번을 입력하세요" maxlength="20" inputmode="numeric" style="flex:1;" />
      <button class="btn btn-primary" id="lookupBtn" onclick="lookupStudent()" style="padding:13px 22px;">조회</button>
    </div>
    <div id="lookupMsg" class="msg"></div>
  </div>

  <div id="studentInfoCard" class="card" style="display:none;">
    <div class="student-row">
      <span class="student-name" id="disp_name"></span>
      <span class="badge badge-teal" id="disp_ban"></span>
      <span class="badge badge-gray" id="disp_group"></span>
    </div>
  </div>

  <div id="contentsSection" style="display:none;">
    <div style="font-size:13px;font-weight:600;color:#888;margin-bottom:0.625rem;padding-left:2px;">콘텐츠 선택</div>
    <div id="contentList"></div>
    <div style="margin-top:1rem;">
      <button class="btn btn-primary btn-full" id="submitBtn" onclick="submitSelections()">선택 저장하기</button>
      <div id="submitMsg" class="msg"></div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════
     ADMIN VIEW
══════════════════════════════ -->
<div id="adminView" style="display:none;" class="main">

  <div class="row sb" style="margin-bottom:1rem;">
    <div style="font-size:16px;font-weight:700;">관리자 패널</div>
    <button class="btn btn-outline btn-sm" onclick="adminLogout()">로그아웃</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">콘텐츠 관리</div>
    <div class="tab" onclick="switchTab(1)">신청/환불 현황</div>
  </div>

  <!-- 콘텐츠 관리 -->
  <div id="tab0" class="tab-pane active">
    <div class="card">
      <div class="section-title">콘텐츠 추가</div>
      <div class="add-grid">
        <div class="span2">
          <label>콘텐츠 이름</label>
          <input type="text" id="newName" placeholder="예: 국어 위클리팩 1호" />
        </div>
        <div>
          <label>배부일</label>
          <input type="date" id="newDelivery" />
        </div>
        <div>
          <label>환불 가능 시작일</label>
          <input type="date" id="newRefund" />
        </div>
        <div class="span2">
          <button class="btn btn-primary btn-full" onclick="addContent()">추가하기</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">콘텐츠 목록</div>
      <div id="adminContentList"><div class="empty">등록된 콘텐츠가 없습니다</div></div>
    </div>
  </div>

  <!-- 신청/환불 현황 -->
  <div id="tab1" class="tab-pane">
    <div class="card">
      <div class="row sb" style="margin-bottom:1rem;">
        <div class="section-title" style="margin:0;">전체 현황</div>
        <button class="btn btn-outline btn-sm" onclick="exportExcel()">엑셀 다운로드</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr id="tblHead"></tr></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════
     ADMIN LOGIN MODAL
══════════════════════════════ -->
<div id="loginModal" class="overlay">
  <div class="modal">
    <h2>관리자 로그인</h2>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="이메일 입력" />
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" />
    </div>
    <div id="loginMsg" class="msg" style="margin-bottom:10px;"></div>
    <button class="btn btn-primary btn-full" onclick="adminLogin()">로그인</button>
    <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- Firebase + SheetJS -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
/* ════════════════════════════════════════
   ★ 여기를 채워주세요
   ════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDrwaQk4j8MM_XRw7zN2wQiEPBZiY4Mxq8",
  authDomain:        "contents-1910f.firebaseapp.com",
  projectId:         "contents-1910f",
  storageBucket:     "contents-1910f.firebasestorage.app",
  messagingSenderId: "19313028773",
  appId:             "1:19313028773:web:023ec211a18b826f0fa74c"
};
// Apps Script 불필요 — Firestore 직접 조회
/* ════════════════════════════════════════ */

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

let student    = null;
let contents   = [];
let selections = {};

/* ── UTILS ── */
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2600);
}
function setMsg(id, text, type = "") {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "msg " + type;
}
function today() { return new Date().toISOString().slice(0, 10); }
function closeModal() { document.getElementById("loginModal").classList.remove("open"); }
function openAdminLogin() { document.getElementById("loginModal").classList.add("open"); }

/* ── STUDENT: lookup ── */
async function lookupStudent() {
  const sid = document.getElementById("sidInput").value.trim();
  if (!sid) { setMsg("lookupMsg", "학번을 입력해주세요.", "error"); return; }

  const btn = document.getElementById("lookupBtn");
  btn.disabled = true;
  setMsg("lookupMsg", "조회 중...", "loading");

  try {
    const doc = await db.collection("students").doc(sid).get();

    if (!doc.exists) { setMsg("lookupMsg", "해당 학번을 찾을 수 없습니다.", "error"); return; }

    const data = doc.data();
    student = { id: sid, name: data.이름, 반: data.반, 그룹: data.그룹 };
    setMsg("lookupMsg", "");

    document.getElementById("disp_name").textContent  = student.name;
    document.getElementById("disp_ban").textContent   = student.반 + "반";
    document.getElementById("disp_group").textContent = student.그룹 + "그룹";
    document.getElementById("studentInfoCard").style.display = "";

    await loadContentsAndPrev();
    renderContents();
  } catch(err) {
    setMsg("lookupMsg", "조회 실패: " + err.message, "error");
  } finally {
    btn.disabled = false;
  }
}

/* ── STUDENT: load ── */
async function loadContentsAndPrev() {
  const [cSnap, sDoc] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").doc(student.id).get()
  ]);
  contents   = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  selections = sDoc.exists ? (sDoc.data().selections || {}) : {};
}

/* ── STUDENT: render ── */
function renderContents() {
  const t    = today();
  const list = document.getElementById("contentList");

  if (!contents.length) {
    list.innerHTML = '<div class="card empty">등록된 콘텐츠가 없습니다.</div>';
    document.getElementById("contentsSection").style.display = "";
    return;
  }

  list.innerHTML = contents.map(c => {
    const refundOk = c.refundAvailableFrom && c.refundAvailableFrom <= t;
    if (!selections[c.id]) selections[c.id] = "신청"; // 기본값: 신청
    const sel = selections[c.id];

    return `
      <div class="content-card">
        <div class="content-top">
          <div>
            <div class="content-name">${c.name}</div>
            <div class="content-dates">
              ${c.deliveryDate ? "배부일 " + c.deliveryDate : ""}
              ${c.deliveryDate && c.refundAvailableFrom ? " &nbsp;·&nbsp; " : ""}
              ${c.refundAvailableFrom ? "환불 시작 " + c.refundAvailableFrom : ""}
            </div>
          </div>
          ${c.refundAvailableFrom ? `
            <div class="refund-tag ${refundOk ? "refund-on" : "refund-off"}">
              ${refundOk ? "환불 가능" : "환불 불가"}
            </div>` : ""}
        </div>
        <div class="sel-row">
          <button class="sel-btn ${sel === "환불" ? "sel-refund" : ""}"
            onclick="pick('${c.id}','환불',this)"
            ${!refundOk ? "disabled" : ""}>환불</button>
          <button class="sel-btn ${sel === "신청" ? "sel-apply" : ""}"
            onclick="pick('${c.id}','신청',this)">신청</button>
        </div>
      </div>`;
  }).join("");

  document.getElementById("contentsSection").style.display = "";
}

function pick(cid, val, btn) {
  selections[cid] = val;
  btn.closest(".sel-row").querySelectorAll(".sel-btn").forEach(b =>
    b.classList.remove("sel-refund", "sel-apply")
  );
  if (val === "환불") btn.classList.add("sel-refund");
  else               btn.classList.add("sel-apply");
}

/* ── STUDENT: submit ── */
async function submitSelections() {
  if (!student) return;
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  setMsg("submitMsg", "저장 중...", "loading");
  try {
    await db.collection("submissions").doc(student.id).set({
      studentId: student.id, studentName: student.name,
      반: student.반, 그룹: student.그룹,
      selections,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setMsg("submitMsg", "");
    toast("✓ 저장되었습니다");
  } catch {
    setMsg("submitMsg", "저장에 실패했습니다. 다시 시도해주세요.", "error");
  } finally {
    btn.disabled = false;
  }
}

/* ── ADMIN: auth ── */
async function adminLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  setMsg("loginMsg", "로그인 중...", "loading");
  try {
    await auth.signInWithEmailAndPassword(email, pw);
    closeModal();
    document.getElementById("studentView").style.display = "none";
    document.getElementById("adminView").style.display   = "";
    loadAdminContents();
    loadSubmissions();
  } catch {
    setMsg("loginMsg", "이메일 또는 비밀번호를 확인해주세요.", "error");
  }
}

async function adminLogout() {
  await auth.signOut();
  document.getElementById("adminView").style.display   = "none";
  document.getElementById("studentView").style.display = "";
}

/* ── ADMIN: contents ── */
async function addContent() {
  const name     = document.getElementById("newName").value.trim();
  const delivery = document.getElementById("newDelivery").value;
  const refund   = document.getElementById("newRefund").value;
  if (!name) { toast("콘텐츠 이름을 입력해주세요"); return; }

  const snap = await db.collection("contents").orderBy("order","desc").limit(1).get();
  const lastOrder = snap.empty ? 0 : (snap.docs[0].data().order || 0);

  await db.collection("contents").add({
    name,
    deliveryDate:        delivery || null,
    refundAvailableFrom: refund   || null,
    order: lastOrder + 1,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("newName").value     = "";
  document.getElementById("newDelivery").value = "";
  document.getElementById("newRefund").value   = "";
  toast("콘텐츠가 추가되었습니다");
  loadAdminContents();
}

async function deleteContent(id) {
  if (!confirm("정말 삭제하시겠습니까?")) return;
  await db.collection("contents").doc(id).delete();
  toast("삭제되었습니다");
  loadAdminContents();
}

async function loadAdminContents() {
  const snap = await db.collection("contents").orderBy("order").get();
  const el   = document.getElementById("adminContentList");
  if (snap.empty) { el.innerHTML = '<div class="empty">등록된 콘텐츠가 없습니다</div>'; return; }
  el.innerHTML = snap.docs.map(d => {
    const c = d.data();
    return `
      <div class="cl-item">
        <div class="cl-info">
          <div class="cl-name">${c.name}</div>
          <div class="cl-dates">
            ${c.deliveryDate ? "배부일 " + c.deliveryDate : ""}
            ${c.deliveryDate && c.refundAvailableFrom ? " · " : ""}
            ${c.refundAvailableFrom ? "환불 시작 " + c.refundAvailableFrom : ""}
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteContent('${d.id}')">삭제</button>
      </div>`;
  }).join("");
}

/* ── ADMIN: submissions ── */
async function loadSubmissions() {
  const [cSnap, sSnap] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").get()
  ]);
  const cols = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const subs = sSnap.docs.map(d => d.data());

  document.getElementById("tblHead").innerHTML =
    `<th>학번</th><th>이름</th><th>반</th><th>그룹</th>` +
    cols.map(c => `<th>${c.name}</th>`).join("");

  const body = document.getElementById("tblBody");
  if (!subs.length) {
    body.innerHTML = `<tr><td colspan="${4 + cols.length}" style="text-align:center;color:#ccc;padding:1.5rem;">데이터가 없습니다</td></tr>`;
    return;
  }
  body.innerHTML = subs.map(s => `
    <tr>
      <td>${s.studentId}</td><td>${s.studentName}</td><td>${s.반}</td><td>${s.그룹}</td>
      ${cols.map(c => {
        const v = s.selections?.[c.id];
        if (v === "환불") return `<td class="tag-r">환불</td>`;
        if (v === "신청") return `<td class="tag-a">신청</td>`;
        return `<td style="color:#ddd;">-</td>`;
      }).join("")}
    </tr>`).join("");
}

/* ── ADMIN: excel ── */
async function exportExcel() {
  const [cSnap, sSnap] = await Promise.all([
    db.collection("contents").orderBy("order").get(),
    db.collection("submissions").get()
  ]);
  const cols = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const subs = sSnap.docs.map(d => d.data());

  const headers = ["학번","이름","반","그룹", ...cols.map(c => c.name)];
  const rows    = subs.map(s => [
    s.studentId, s.studentName, s.반, s.그룹,
    ...cols.map(c => s.selections?.[c.id] || "-")
  ]);

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "신청환불현황");
  XLSX.writeFile(wb, `QUETTA_신청환불_${today()}.xlsx`);
}

/* ── TABS ── */
function switchTab(idx) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i === idx));
  document.querySelectorAll(".tab-pane").forEach((p,i) => p.classList.toggle("active", i === idx));
  if (idx === 1) loadSubmissions();
}

document.getElementById("sidInput").addEventListener("keydown", e => { if (e.key === "Enter") lookupStudent(); });
document.getElementById("loginPw").addEventListener("keydown",  e => { if (e.key === "Enter") adminLogin(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
